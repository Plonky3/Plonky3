[package]
name = "p3-warp"
description = "WARP accumulation scheme for Reed-Solomon codes (eprint 2025/753)"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true

[dependencies]
itertools.workspace = true
openvm-cpu-backend = { path = "../../stark-backend/crates/cpu-backend", default-features = false, optional = true }
openvm-stark-backend = { path = "../../stark-backend/crates/stark-backend", default-features = false, optional = true }
p3-air.workspace = true
p3-challenger.workspace = true
p3-commit.workspace = true
p3-dft.workspace = true
p3-field.workspace = true
p3-matrix.workspace = true
p3-maybe-rayon.workspace = true
p3-merkle-tree.workspace = true
p3-multilinear-util.workspace = true
p3-symmetric.workspace = true
p3-util.workspace = true
p3-whir.workspace = true
serde = { workspace = true, features = ["derive", "alloc"] }
thiserror.workspace = true
tracing.workspace = true

[dev-dependencies]
criterion.workspace = true
openvm-stark-sdk = { path = "../../stark-backend/crates/stark-sdk", default-features = false, features = ["cpu-backend"] }
p3-baby-bear = { path = "../baby-bear" }
postcard = { workspace = true, features = ["use-std"] }
proptest.workspace = true
rand.workspace = true

[features]
parallel = [
    "p3-maybe-rayon/parallel",
    "openvm-cpu-backend?/parallel",
    "openvm-stark-backend?/parallel",
    "openvm-stark-sdk/parallel",
]
stark-backend = ["dep:openvm-cpu-backend", "dep:openvm-stark-backend"]

[[bench]]
name = "sumcheck"
harness = false

[lints]
workspace = true
